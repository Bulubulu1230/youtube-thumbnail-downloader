<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Thumbnail Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e4e4e4;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .thumbnails-section {
            display: none;
        }

        .thumbnails-section.show {
            display: block;
        }

        .video-info {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-id {
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .video-id strong {
            color: #667eea;
        }

        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .thumbnail-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .thumbnail-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .thumbnail-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #667eea;
        }

        .thumbnail-resolution {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 15px;
        }

        .thumbnail-preview {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail-preview img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        .thumbnail-preview.loading {
            color: #666;
            font-size: 0.9rem;
        }

        .thumbnail-preview.error {
            color: #ef4444;
            font-size: 0.85rem;
            padding: 10px;
            text-align: center;
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .input-group {
                flex-direction: column;
            }

            .thumbnails-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YouTube Thumbnail Downloader</h1>
            <p class="subtitle">Download high-quality thumbnails from any YouTube video</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="Paste YouTube video URL here (e.g., https://www.youtube.com/watch?v=dQw4w9WgXcQ)"
                    autocomplete="off"
                >
                <button id="fetchBtn" onclick="fetchThumbnails()">Get Thumbnails</button>
            </div>
            <div id="error" class="error"></div>
        </div>

        <div id="thumbnailsSection" class="thumbnails-section">
            <div class="video-info">
                <p class="video-id">Video ID: <strong id="videoId"></strong></p>
            </div>

            <div class="thumbnails-grid" id="thumbnailsGrid"></div>
        </div>

        <footer>
            <p>Made with ❤️ for YouTube creators | <a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script>
        const thumbnailQualities = [
            { name: 'Default', key: 'default', resolution: '120x90' },
            { name: 'Medium Quality', key: 'mqdefault', resolution: '320x180' },
            { name: 'High Quality', key: 'hqdefault', resolution: '480x360' },
            { name: 'Standard Definition', key: 'sddefault', resolution: '640x480' },
            { name: 'Maximum Resolution', key: 'maxresdefault', resolution: '1280x720' }
        ];

        function extractVideoId(url) {
            // Support various YouTube URL formats
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];

            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) {
                    return match[1];
                }
            }

            return null;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            const errorDiv = document.getElementById('error');
            errorDiv.classList.remove('show');
        }

        function fetchThumbnails() {
            const input = document.getElementById('videoUrl');
            const url = input.value.trim();

            hideError();

            if (!url) {
                showError('Please enter a YouTube video URL');
                return;
            }

            const videoId = extractVideoId(url);

            if (!videoId) {
                showError('Invalid YouTube URL. Please enter a valid YouTube video URL.');
                return;
            }

            // Show video ID
            document.getElementById('videoId').textContent = videoId;

            // Clear previous thumbnails
            const grid = document.getElementById('thumbnailsGrid');
            grid.innerHTML = '';

            // Create thumbnail cards
            thumbnailQualities.forEach(quality => {
                const card = createThumbnailCard(videoId, quality);
                grid.appendChild(card);
            });

            // Show thumbnails section
            document.getElementById('thumbnailsSection').classList.add('show');

            // Scroll to thumbnails
            document.getElementById('thumbnailsSection').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        function createThumbnailCard(videoId, quality) {
            const card = document.createElement('div');
            card.className = 'thumbnail-card';

            const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/${quality.key}.jpg`;

            card.innerHTML = `
                <div class="thumbnail-title">${quality.name}</div>
                <div class="thumbnail-resolution">${quality.resolution}</div>
                <div class="thumbnail-preview loading" id="preview-${quality.key}">
                    Loading...
                </div>
                <button class="download-btn" onclick="downloadThumbnail('${thumbnailUrl}', '${videoId}_${quality.key}.jpg')">
                    Download ${quality.name}
                </button>
            `;

            // Load thumbnail image
            const img = new Image();
            const previewDiv = card.querySelector(`#preview-${quality.key}`);

            img.onload = function() {
                previewDiv.innerHTML = '';
                previewDiv.classList.remove('loading');
                previewDiv.appendChild(img);
            };

            img.onerror = function() {
                previewDiv.classList.remove('loading');
                previewDiv.classList.add('error');
                previewDiv.textContent = 'Thumbnail not available';
            };

            img.src = thumbnailUrl;
            img.alt = `${quality.name} thumbnail`;

            return card;
        }

        async function downloadThumbnail(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Clean up
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                showError('Failed to download thumbnail. Please try again.');
                console.error('Download error:', error);
            }
        }

        // Allow Enter key to trigger fetch
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchThumbnails();
            }
        });

        // Clear error when user starts typing
        document.getElementById('videoUrl').addEventListener('input', function() {
            hideError();
        });
    </script>
</body>
</html>
